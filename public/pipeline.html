<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 제품 파이프라인 — GOODS OS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<style>
:root{
  --bg:#0f172a; --surface:#1e293b; --surface-2:#334155; --line:#334155;
  --text:#e2e8f0; --text-2:#94a3b8; --text-3:#64748b;
  --accent:#60a5fa; --accent-strong:#93c5fd; --accent-bg:rgba(96,165,250,.14);
  --ok:#34d399; --warn:#fbbf24; --err:#f87171;
  --new:#c4b5fd; --new-bg:rgba(139,92,246,.18); --re:#67e8f9; --re-bg:rgba(8,145,178,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
.page{padding:22px 28px 60px;max-width:1500px;margin:0 auto}
h1{font-size:18px;font-weight:700}
.sub{font-size:11.5px;color:var(--text-3);margin-top:2px}
button{font-family:inherit;cursor:pointer}
.btn{background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:600;transition:.12s}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0f172a}
.btn.danger{color:var(--err)}
.btn.sm{padding:4px 10px;font-size:11.5px;border-radius:6px}
input,select,textarea{font-family:inherit;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:7px 10px;font-size:13px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid var(--line);border-radius:4px;background:var(--surface-2);cursor:pointer;position:relative;flex-shrink:0;vertical-align:middle;margin:0}
input[type=checkbox]:hover{border-color:var(--accent)}
input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
input[type=checkbox]:checked::after{content:'✓';position:absolute;left:0;right:0;top:-1px;text-align:center;color:#0f172a;font-size:11px;font-weight:900;line-height:15px}
.kpis{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap;align-items:center}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 16px;font-size:11.5px;color:var(--text-2)}
.kpi b{display:block;font-size:19px;color:var(--text)}
.kpi b.warn{color:var(--warn)} .kpi b.err{color:var(--err)}
.filters{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:4px 12px;font-size:11.5px;color:var(--text-2);cursor:pointer}
.chip.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-strong);font-weight:700}
.tag{display:inline-block;border-radius:5px;padding:1px 7px;font-size:10.5px;font-weight:700;white-space:nowrap}
.t-new{background:var(--new-bg);color:var(--new)} .t-re{background:var(--re-bg);color:var(--re)}
.t-ok{background:rgba(52,211,153,.16);color:var(--ok)} .t-warn{background:rgba(251,191,36,.14);color:var(--warn)}
.t-gray{background:var(--surface-2);color:var(--text-2)} .t-err{background:rgba(248,113,113,.14);color:var(--err)}
.board{display:flex;gap:11px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.col{flex:1;min-width:196px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px}
.col h4{font-size:11.5px;color:var(--text-2);margin-bottom:9px;display:flex;justify-content:space-between;font-weight:600}
.pcard{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 11px;margin-bottom:8px;cursor:pointer;transition:.12s}
.pcard:hover{border-color:var(--accent);transform:translateY(-1px)}
.pcard .em{font-size:19px}
.pcard b{display:block;font-size:12.5px;margin:2px 0;line-height:1.35}
.pcard .row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:5px;font-size:10.5px;color:var(--text-3)}
.bar{height:4px;background:var(--bg);border-radius:99px;margin-top:8px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent);border-radius:99px}
.empty-col{font-size:11px;color:var(--text-3);text-align:center;padding:14px 0}
.closed-strip{margin-top:18px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 16px}
.closed-strip summary{cursor:pointer;font-size:12.5px;color:var(--text-2);font-weight:600}
.closed-item{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;cursor:pointer}
.closed-item:last-child{border-bottom:none}
/* view toggle */
.vtoggle{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.vtoggle button{background:var(--surface);border:none;color:var(--text-2);padding:6px 13px;font-size:12px;font-weight:700}
.vtoggle button.on{background:var(--accent);color:#0f172a}
/* table view */
.tblwrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow-x:auto}
.sec{margin-bottom:18px}
.sec-head{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;margin:0 0 8px 2px}
.sec-head .cnt{font-size:11.5px;color:var(--text-3);font-weight:600}
.sec-head .line{flex:1;height:1px;background:var(--line)}
.sec.own .sec-head{color:var(--accent-strong)} .sec.oem .sec-head{color:var(--warn)}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{background:#16213a;color:var(--text-3);font-size:11px;padding:9px 10px;text-align:left;cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--line);user-select:none}
.tbl th:hover{color:var(--accent-strong)}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(51,65,85,.5);vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(96,165,250,.06);cursor:pointer}
.mini-steps{display:flex;gap:2px}
.mini-steps i{width:13px;height:5px;border-radius:2px;background:var(--surface-2)}
.mini-steps i.d{background:var(--ok)}.mini-steps i.c{background:var(--accent)}
.nextact{font-size:11.5px;color:var(--text-2);max-width:260px}
.dday-soon{color:var(--warn);font-weight:700}.dday-late{color:var(--err);font-weight:700}
/* timeline (gantt) view */
.gt{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;overflow-x:auto}
.gt-grid{position:relative;min-width:880px}
.gt-months{position:relative;height:22px;border-bottom:1px solid var(--line);margin-left:210px;font-size:10.5px;color:var(--text-3)}
.gt-months span{position:absolute;top:3px;border-left:1px dashed rgba(51,65,85,.7);padding-left:5px}
.gt-row{display:flex;align-items:center;height:34px;border-bottom:1px solid rgba(51,65,85,.35)}
.gt-row:hover{background:rgba(96,165,250,.05);cursor:pointer}
.gt-label{width:210px;flex-shrink:0;font-size:12px;font-weight:600;display:flex;gap:6px;align-items:center;overflow:hidden;white-space:nowrap}
.gt-track{flex:1;position:relative;height:100%}
.gt-bar{position:absolute;top:8px;height:16px;border-radius:99px;font-size:9.5px;font-weight:700;color:#0f172a;display:flex;align-items:center;padding:0 8px;white-space:nowrap;overflow:hidden}
.gt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--err);opacity:.7}
.gt-marker{position:absolute;top:5px;font-size:11px}
.gt-legend{font-size:11px;color:var(--text-3);margin-top:10px}
/* modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(2,6,23,.7);z-index:100;padding:26px 14px;overflow-y:auto}
.mbg.on{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:14px;max-width:880px;width:100%;padding:22px 24px;position:relative}
.modal .x{position:absolute;top:13px;right:14px;border:none;background:var(--surface-2);color:var(--text-2);border-radius:8px;width:30px;height:30px;font-size:14px}
.steps{display:flex;gap:3px;margin:14px 0;flex-wrap:wrap}
.step{flex:1;min-width:68px;text-align:center;font-size:10.5px;padding:7px 3px;border-radius:7px;background:var(--bg);color:var(--text-3);font-weight:600;cursor:pointer;border:1px solid transparent}
.step:hover{border-color:var(--accent)}
.step.done{background:rgba(52,211,153,.13);color:var(--ok)}
.step.now{background:var(--accent);color:#0f172a;font-weight:800}
.step.lit{background:rgba(52,211,153,.18);color:var(--ok);font-weight:800;box-shadow:0 0 10px rgba(52,211,153,.25)}
.step.view{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent) inset}
.step.lit.view{box-shadow:0 0 0 1.5px var(--accent) inset,0 0 10px rgba(52,211,153,.25)}
.subtabs{display:flex;gap:2px;margin:14px 0 12px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.subtabs button{border:none;background:none;padding:8px 13px;font-size:12.5px;font-weight:700;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px}
.subtabs button.on{color:var(--accent-strong);border-color:var(--accent)}
.pane{display:none}.pane.on{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
th{color:var(--text-3);font-size:11px;font-weight:600;white-space:nowrap}
td input,td select{padding:4px 7px;font-size:12px;width:100%;min-width:52px}
.check{display:flex;gap:9px;align-items:center;padding:7px 2px;border-bottom:1px dashed var(--line);font-size:13px}
.check.done span{color:var(--text-3);text-decoration:line-through}
.check .del{margin-left:auto;border:none;background:none;color:var(--text-3);font-size:12px}
.check .del:hover{color:var(--err)}
.tl{border-left:2px solid var(--line);margin-left:5px;padding-left:14px;margin-top:8px}
.tle{position:relative;padding:2px 0 9px;font-size:12.5px}
.tle::before{content:"";position:absolute;left:-19.5px;top:8px;width:8px;height:8px;border-radius:99px;background:var(--accent)}
.tle small{color:var(--text-3);display:block;font-size:11px}
.frow{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;align-items:center}
.frow label{font-size:11.5px;color:var(--text-2);min-width:74px}
.hint{font-size:11px;color:var(--text-3);margin-top:6px}
.vendor-box{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.vendor-box.selected{border-color:var(--ok)}
.vendor-head{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.vendor-head b{font-size:13.5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--accent);color:var(--text);padding:9px 18px;border-radius:10px;font-size:12.5px;z-index:300;display:none}
</style>
</head>
<body>
<div class="page">
  <div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap">
    <div>
      <h1>🚀 제품 파이프라인</h1>
      <div class="sub">신제품·재발주 — 디자인 → 업체선정(견적비교) → 샘플 → 발주·대금 → 배송 → 입고 → 등록·출시</div>
    </div>
    <button class="btn" style="margin-left:auto" onclick="openRefsLib(null)">📚 제조 레퍼런스</button>
    <button class="btn primary" onclick="openNew()">＋ 새 프로젝트</button>
  </div>

  <div class="kpis" id="kpis"></div>

  <div id="tableWrap" style="display:none"></div>
  <div class="gt" id="ganttWrap" style="display:none"><div class="gt-grid" id="gantt"></div>
    <div class="gt-legend">막대 색 = 현재 단계 · 🔻 대금 예정일(미지급) · 📦 입고 ETA · 빨간 세로선 = 오늘 · 막대 끝 = ETA(없으면 추정)</div></div>
  <div class="board" id="board" style="display:none"></div>

  <div id="selBar" style="display:none;position:sticky;bottom:12px;z-index:40;margin-top:12px;background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:11px 16px;box-shadow:0 6px 20px rgba(0,0,0,.4);align-items:center;gap:12px">
    <b id="selBarCount"></b><span id="selBarNames" style="font-size:11.5px;color:var(--text-3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button class="btn sm" onclick="clearSel()">선택 해제</button>
    <button class="btn primary sm" onclick="openInquiry()">🏭 선택 제품으로 제조사 문의 →</button>
  </div>

  <details class="closed-strip" id="closedStrip" style="display:none">
    <summary>완료·보류·취소 프로젝트 <span id="closedCount"></span></summary>
    <div id="closedList"></div>
  </details>
</div>

<!-- 새 프로젝트 -->
<div class="mbg" id="newModal" onclick="if(event.target===this)closeM('newModal')">
  <div class="modal" style="max-width:520px">
    <button class="x" onclick="closeM('newModal')">✕</button>
    <h2 style="font-size:16px">＋ 새 프로젝트</h2>
    <div class="frow" style="margin-top:14px"><label>유형</label>
      <button class="chip on" id="typeNew" onclick="pickType('new')">✨ 신제품 (풀 파이프라인)</button>
      <button class="chip" id="typeRe" onclick="pickType('reorder')">🔁 재발주 (단축)</button>
    </div>
    <div class="frow"><label>생산 구분</label>
      <button class="chip on" id="brandOwn" onclick="pickBrand('own')">🏷️ 자체브랜드 (미스터두낫띵)</button>
      <button class="chip" id="brandOem" onclick="pickBrand('oem')">🤝 외주 (고객사 발주)</button>
    </div>
    <div class="frow" id="npClientRow" style="display:none"><label>발주처</label><input id="npClient" style="flex:1" placeholder="외주 고객사 (예: 수성문화재단)"></div>
    <div class="frow"><label>이모지</label><input id="npEmoji" style="width:64px" value="✨"></div>
    <div class="frow"><label>제품명</label><input id="npName" style="flex:1" placeholder="예: 두낫띵 비닐봉투 LDPE 다이컷"></div>
    <div class="frow"><label>목표 수량</label><input id="npQty" type="number" style="width:110px" placeholder="10000"></div>
    <div class="frow"><label>목표 단가≤</label><input id="npCost" type="number" style="width:110px" placeholder="원"><span style="font-size:11px;color:var(--text-3)">원 (선택)</span></div>
    <div class="frow"><label>발주 근거</label><input id="npBasis" style="flex:1" placeholder="예: 문구박람회 821결제건 → 권장 1만장"></div>
    <div class="frow" id="npBarcodeRow" style="display:none"><label>기존 바코드</label><input id="npBarcode" style="flex:1" placeholder="재발주 제품의 바코드"></div>
    <div style="margin-top:14px;text-align:right"><button class="btn primary" onclick="createProject()">생성</button></div>
  </div>
</div>

<!-- 상세 -->
<div class="mbg" id="detailModal" onclick="if(event.target===this)closeM('detailModal')">
  <div class="modal" id="detailBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let META=null, PROJECTS=[], REFS=[], MFRS=[], OUTREACH=[], OHMETA={}, CUR=null, CURTAB='cl', NEWTYPE='new';
let SEL=new Set();   // 다중선택된 프로젝트 id (소싱 문의용)

const COLS=[
  {t:'💡 기획·디자인·검토', stages:['plan','design','review']},
  {t:'🏭 업체선정·단가', stages:['vendor','pricing']},
  {t:'📦 샘플', stages:['sample']},
  {t:'💳 발주·대금·생산', stages:['po','production']},
  {t:'🚢 배송·입고', stages:['shipping','inbound']},
  {t:'🚀 등록·출시', stages:['launch']}
];
const PAY_KINDS={deposit:'선금',balance:'잔금',sample:'샘플비',shipping:'운송비',etc:'기타'};

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2200)}
async function api(path,opt={}){
  const r=await fetch('/api/pipeline'+path,{headers:{'Content-Type':'application/json'},...opt,body:opt.body?JSON.stringify(opt.body):undefined});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||('HTTP '+r.status))}
  return r.json();
}
function stageLabel(k){const m=META.stage_meta[k];return m?m.emoji+' '+m.label:k}
// ── 단계 완료 자동 판정 (데이터 기반 — 순서 무관, 조건 충족 시 불 켜짐) ──
function stageComplete(p,s){
  const cl=(p.checklist&&p.checklist[s])||[];
  const allChecked=cl.length>0&&cl.every(c=>c.done);
  switch(s){
    case 'plan':       return allChecked || !!(p.consumerPricingId) || !!(p.target&&(p.target.sell_price||p.target.unit_cost_max));
    case 'design':     return !!(p.design&&p.design.confirmed_at) || (p.attachments||[]).some(a=>a.stage==='design') || (p.design&&(p.design.files||[]).length>0) || allChecked;
    case 'vendor':     return (p.vendors||[]).some(v=>v.status==='selected') || allChecked;
    case 'pricing':    return (p.vendors||[]).some(v=>(v.quotes||[]).length>0) || allChecked;
    case 'review':     return allChecked;
    case 'sample':     return (p.samples||[]).some(x=>x.verdict==='approved') || allChecked;
    case 'po':         return !!(p.po&&(p.po.vendor||p.po.qty)) || allChecked;
    case 'production': return allChecked;
    case 'shipping':   return !!(p.po&&p.po.eta) || allChecked;
    case 'inbound':    return !!p.inbound || allChecked;
    case 'launch':     return !!((p.links&&p.links.catalog_id)||p.barcode) || allChecked;
    default:           return allChecked;
  }
}
// 완료 조건 설명 (툴팁)
const STAGE_DONE_HINT={plan:'사업성 검토 연동 / 목표가 설정 / 체크리스트 완료 시',design:'디자인 파일 첨부(디자인 단계) 또는 시안 확정 시',vendor:'업체 선정 시',pricing:'단가(견적) 확인 시',sample:'샘플 승인 시',po:'발주(PO) 등록 시',production:'생산 체크리스트 완료 시',shipping:'ETA 등록 시',inbound:'입고 대사 기록 시',launch:'바코드·카탈로그 등록 시',review:'발주 검토 완료 시'};
function completedCount(p){return p.stages.filter(s=>stageComplete(p,s)).length;}
function clientProgress(p){return p.status==='done'?100:Math.round(completedCount(p)/p.stages.length*100);}
function fxKrw(amount,cur){
  if(cur==='KRW')return amount;
  const fx=META&&META.fx;const rate=fx&&fx[cur];
  return rate?amount*rate:null;
}
function fmtKrw(n){return n==null?'—':'₩'+Math.round(n).toLocaleString()}
function daysSince(iso){return Math.floor((Date.now()-new Date(iso).getTime())/86400000)}

async function load(){
  if(!META)META=await api('/meta');
  const d=await api('/');
  PROJECTS=d.projects;
  try{ REFS=(await api('/refs')).refs||[]; }catch(e){ REFS=[]; }
  try{ MFRS=(await api('/manufacturers')).manufacturers||[]; }catch(e){ MFRS=[]; }
  try{ const od=await api('/outreach'); OUTREACH=od.outreach||[]; OHMETA={status_label:od.status_label||{},kinds:od.kinds||[]}; }catch(e){ OUTREACH=[]; }
  render();
}

// ── 파생값 헬퍼 (실데이터 기반) ──
function nextAction(p){
  const cl=(p.checklist&&p.checklist[p.stage])||[];
  const first=cl.find(c=>!c.done);
  return first?first.t:stageLabel(p.stage)+' 마무리';
}
function payDue(p){ // 미지급 대금 중 가장 이른 예정일
  const dues=(p.payments||[]).filter(x=>!x.paid_at&&x.due).map(x=>x.due).sort();
  return dues[0]||null;
}
function unpaidKrw(p){
  let s=0;(p.payments||[]).forEach(x=>{if(!x.paid_at){const k=fxKrw(Number(x.amount)||0,x.cur||'KRW');if(k)s+=k}});
  return s;
}
const todayStr=()=>new Date().toISOString().slice(0,10);
function ddayClass(d){if(!d)return '';const t=todayStr();if(d<t)return 'dday-late';const diff=(new Date(d)-new Date(t))/86400000;return diff<=3?'dday-soon':''}

function render(){
  const active=PROJECTS.filter(p=>p.status==='active');
  const closed=PROJECTS.filter(p=>p.status!=='active');
  // KPI
  const stale=active.filter(p=>daysSince(p.updated_at)>=7);
  let dueKrw=0;active.forEach(p=>dueKrw+=unpaidKrw(p));
  $('kpis').innerHTML=
    `<div class="kpi"><b>${active.length}</b>진행 중</div>`+
    `<div class="kpi"><b class="${stale.length?'warn':''}">${stale.length}</b>7일+ 정체 ⚠️</div>`+
    `<div class="kpi"><b>${dueKrw?('₩'+(dueKrw/1e6).toFixed(1)+'M'):'—'}</b>대금 예정(미지급)</div>`+
    `<div class="kpi"><b>${PROJECTS.filter(p=>p.status==='done').length}</b>완료</div>`+
    `<div class="filters">
      <span class="chip ${FILTER==='all'?'on':''}" onclick="setFilter('all')">전체</span>
      <span class="chip ${FILTER==='new'?'on':''}" onclick="setFilter('new')">✨ 신제품</span>
      <span class="chip ${FILTER==='reorder'?'on':''}" onclick="setFilter('reorder')">🔁 재발주</span>
      <span style="width:1px;height:18px;background:var(--line);margin:0 2px"></span>
      <span class="chip ${BFILTER==='own'?'on':''}" onclick="setBFilter('own')">🏷️ 자체</span>
      <span class="chip ${BFILTER==='oem'?'on':''}" onclick="setBFilter('oem')">🤝 외주</span>
      <span class="vtoggle">
        <button class="${VIEW==='table'?'on':''}" onclick="setView('table')">📋 테이블</button>
        <button class="${VIEW==='gantt'?'on':''}" onclick="setView('gantt')">🗓 타임라인</button>
        <button class="${VIEW==='board'?'on':''}" onclick="setView('board')">🗂 칸반</button>
        <button class="${VIEW==='sourcing'?'on':''}" onclick="setView('sourcing')">🏭 소싱 문의${OUTREACH.length?' ('+OUTREACH.length+')':''}</button>
      </span>
    </div>`;
  const vis=active.filter(p=>(FILTER==='all'||p.type===FILTER)&&(BFILTER==='all'||brandOf(p)===BFILTER));
  $('tableWrap').style.display=(VIEW==='table'||VIEW==='sourcing')?'block':'none';
  $('ganttWrap').style.display=VIEW==='gantt'?'block':'none';
  $('board').style.display=VIEW==='board'?'flex':'none';
  if(VIEW==='sourcing')renderSourcing();
  else if(VIEW==='table')renderTable(vis);
  else if(VIEW==='gantt')renderGantt(vis);
  else renderBoard(vis);
  renderSelBar();
  // closed
  $('closedStrip').style.display=closed.length?'block':'none';
  $('closedCount').textContent=closed.length?`(${closed.length})`:'';
  $('closedList').innerHTML=closed.map(p=>
    `<div class="closed-item" onclick="openDetail('${p.id}')"><span>${esc(p.emoji)}</span><b>${esc(p.name)}</b>
     <span class="tag ${p.type==='new'?'t-new':'t-re'}">${p.type==='new'?'신제품':'재발주'}</span>
     <span class="tag ${p.status==='done'?'t-ok':p.status==='hold'?'t-warn':'t-err'}">${{done:'완료',hold:'보류',cancelled:'취소'}[p.status]}</span>
     <span style="margin-left:auto;font-size:11px;color:var(--text-3)">${p.updated_at.slice(0,10)}</span></div>`).join('');
}

// ── 📋 테이블 뷰 (기본) — 자체 / 외주 별도 섹션 ──
function renderTable(vis){
  // BFILTER 로 섹션 표시 결정
  const showOwn=(BFILTER==='all'||BFILTER==='own');
  const showOem=(BFILTER==='all'||BFILTER==='oem');
  const own=vis.filter(p=>brandOf(p)==='own');
  const oem=vis.filter(p=>brandOf(p)==='oem');
  let html='';
  if(showOwn)html+=tableSection('own','🏷️ 자체브랜드 (미스터두낫띵)',own);
  if(showOem)html+=tableSection('oem','🤝 외주 (고객사 발주)',oem);
  if(!html)html='<div style="padding:24px;text-align:center;color:var(--text-3)">해당 구분의 진행 중 제품이 없습니다</div>';
  $('tableWrap').innerHTML=html;
}
function tableSection(kind,title,list){
  const val=p=>({name:p.name,type:p.type,client:(p.client||''),stage:p.stages.indexOf(p.stage)/p.stages.length,
    due:payDue(p)||'9999',eta:(p.po&&p.po.eta)||'9999',amt:unpaidKrw(p),stale:daysSince(p.updated_at)})[SORTK];
  const rows=[...list].sort((a,b)=>{const x=val(a),y=val(b);return (x<y?-1:x>y?1:0)*(SORTD?-1:1)});
  const arrow=k=>SORTK===k?(SORTD?' ▾':' ▴'):'';
  const isOem=kind==='oem';
  const allSel=rows.length&&rows.every(p=>SEL.has(p.id));
  const clientHead=isOem?`<th onclick="sortT('client')">발주처${arrow('client')}</th>`:'';
  let t=`<div class="sec ${kind}"><div class="sec-head">${title}<span class="cnt">${rows.length}</span><span class="line"></span></div>
    <div class="tblwrap"><table class="tbl"><thead><tr>
      <th style="width:26px"><input type="checkbox" class="chk" title="이 구분 전체 선택" ${allSel?'checked':''} onclick="event.stopPropagation();toggleSelAll(${JSON.stringify(rows.map(p=>p.id))})"></th>
      <th onclick="sortT('name')">제품${arrow('name')}</th>${clientHead}<th onclick="sortT('type')">유형${arrow('type')}</th>
      <th onclick="sortT('stage')">단계${arrow('stage')}</th><th>다음 액션</th>
      <th onclick="sortT('due')">대금 마감${arrow('due')}</th><th onclick="sortT('eta')">입고 ETA${arrow('eta')}</th>
      <th onclick="sortT('amt')">대금 예정${arrow('amt')}</th><th onclick="sortT('stale')">정체${arrow('stale')}</th></tr></thead><tbody>`;
  if(!rows.length){
    const cols=isOem?10:9;
    t+=`<tr><td colspan="${cols}" style="padding:18px;text-align:center;color:var(--text-3)">해당 제품 없음</td></tr>`;
  } else t+=rows.map(p=>{
    const due=payDue(p),eta=(p.po&&p.po.eta)||null,amt=unpaidKrw(p),st=daysSince(p.updated_at);
    return `<tr onclick="openDetail('${p.id}')">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="chk" ${SEL.has(p.id)?'checked':''} onclick="toggleSel('${p.id}')"></td>
      <td><b>${esc(p.emoji)} ${esc(p.name)}</b></td>
      ${isOem?`<td>${p.client?esc(p.client):'<span style="color:var(--text-3)">—</span>'}</td>`:''}
      <td><span class="tag ${p.type==='new'?'t-new':'t-re'}">${p.type==='new'?'신제품':'재발주'}</span></td>
      <td><div class="mini-steps">${p.stages.map((s,i)=>{const c=p.stages.indexOf(p.stage);return `<i class="${i<c?'d':i===c?'c':''}" title="${stageLabel(s)}"></i>`}).join('')}</div>
          <span style="font-size:10.5px;color:var(--text-3)">${stageLabel(p.stage)}</span></td>
      <td class="nextact">${esc(nextAction(p))}</td>
      <td class="${ddayClass(due)}">${due?'~'+due.slice(5):'—'}</td>
      <td style="color:var(--text-2)">${eta?'📦 '+eta.slice(5):'—'}</td>
      <td>${amt?'₩'+Math.round(amt).toLocaleString():'—'}</td>
      <td>${st>=7?`<span class="tag t-warn">D+${st} ⚠️</span>`:'<span style="color:var(--text-3)">—</span>'}</td>
      </tr>`;}).join('');
  return t+'</tbody></table></div></div>';
}
function sortT(k){if(SORTK===k)SORTD=!SORTD;else{SORTK=k;SORTD=true}
  try{localStorage.setItem('pl_sortk',SORTK);localStorage.setItem('pl_sortd',SORTD?'1':'0')}catch(e){}
  render()}

function toggleSel(id){SEL.has(id)?SEL.delete(id):SEL.add(id);render();}
function toggleSelAll(ids){const all=ids.every(i=>SEL.has(i)); ids.forEach(i=>all?SEL.delete(i):SEL.add(i)); render();}
function clearSel(){SEL.clear();render();}
function renderSelBar(){
  const bar=$('selBar');
  if(SEL.size&&VIEW!=='sourcing'){
    bar.style.display='flex';
    $('selBarCount').textContent=SEL.size+'개 선택';
    $('selBarNames').textContent=[...SEL].map(id=>{const p=PROJECTS.find(x=>x.id===id);return p?p.emoji+p.name:'';}).join(', ');
  } else bar.style.display='none';
}
const CHANNELS=['WeChat','알리바바','이메일','QQ','전화','기타'];
const OKINDS=['문의','견적요청','샘플요청','발주협의'];
// 선택 제품에서 보낼 파일 자동 수집 (드라이브 첨부 + 연결된 3D 레퍼런스)
function gatherFiles(ids){
  const files=[]; const seenRef=new Set();
  ids.forEach(id=>{
    const p=PROJECTS.find(x=>x.id===id); if(!p)return;
    (p.attachments||[]).filter(a=>a.kind==='drive').forEach(a=>files.push({name:`[${p.name}] ${a.name}`,url:a.url,kind:'drive'}));
    (p.ref_links||[]).forEach(rid=>{if(seenRef.has(rid))return;seenRef.add(rid);const r=REFS.find(x=>x.id===rid);if(r)files.push({name:`📚 ${r.name}`,url:r.url,kind:'ref'});});
  });
  return files;
}

  const html=`<div class="mbg on" id="inqM" onclick="if(event.target===this)closeInq()">

   <div class="frow"><label>포함 제품</label><div style="flex:1;display:flex;gap:4px;flex-wrap:wrap">${prods.map(p=>`<span class="tag t-gray">${esc(p.emoji)} ${esc(p.name)}</span>`).join('')}</div></div>
   <div class="frow"><label>제조사</label>
     <select id="iq-mfr" style="flex:1" onchange="document.getElementById('iq-newmfr').style.display=this.value==='__new'?'block':'none'">
       ${mfrOpts}<option value="__new">＋ 새 제조사 등록…</option></select></div>
   <div id="iq-newmfr" style="display:${MFRS.length?'none':'block'}">
     <div class="frow"><label>새 제조사</label><input id="iq-nm-name" placeholder="상호 (예: 东莞晨阳玩具)" style="flex:1">
       <input id="iq-nm-country" placeholder="국가" style="width:80px"></div>
     <div class="frow"><label></label><input id="iq-nm-handle" placeholder="연락처 (WeChat id·알리바바 링크·이메일)" style="flex:1">
       <input id="iq-nm-spec" placeholder="전문분야 (피규어·봉제…)" style="width:150px"></div>
   </div>
   <div class="frow"><label>유형</label><select id="iq-kind">${OKINDS.map(k=>`<option ${k==='견적요청'?'selected':''}>${k}</option>`).join('')}</select>
     <label style="min-width:auto">채널</label><select id="iq-ch">${CHANNELS.map(c=>`<option>${c}</option>`).join('')}</select>
     <label style="min-width:auto">상태</label><select id="iq-st"><option value="sent" selected>발송함</option><option value="draft">초안(아직 안보냄)</option></select></div>
   <div class="frow" style="align-items:flex-start"><label>보낼 파일</label><div style="flex:1;font-size:12px">
     ${files.length?files.map((f,i)=>`<div style="padding:3px 0"><input type="checkbox" class="chk" id="iq-f-${i}" checked> ${esc(f.name)} <span class="tag ${f.kind==='ref'?'t-ok':'t-gray'}" style="font-size:9px">${f.kind==='ref'?'레퍼런스':'드라이브'}</span></div>`).join(''):'<span class="hint">선택 제품에 드라이브 링크·레퍼런스가 없습니다. 제품 상세 📎첨부에서 먼저 추가하세요.</span>'}
     <div style="margin-top:5px"><input type="checkbox" class="chk" id="iq-direct"> <span class="hint">중국 등 구글드라이브 안 열림 → "파일 직접 전달"로 표기 (링크는 참고용으로만 기록)</span></div>

   </div></div>`;
  const old=$('inqM'); if(old)old.remove();
  document.body.insertAdjacentHTML('beforeend',html);

function closeInq(){const el=$('inqM');if(el)el.remove();}
async function createOutreach(ids){
  let mfrId=$('iq-mfr').value, mfrName='';
  try{
    if(mfrId==='__new'){
      const nm=$('iq-nm-name').value.trim(); if(!nm)return toast('제조사 상호를 입력하세요');
      const m=await api('/manufacturers',{method:'POST',body:{name:nm,country:$('iq-nm-country').value.trim(),handle:$('iq-nm-handle').value.trim(),channel:$('iq-ch').value,specialties:$('iq-nm-spec').value.trim()?[$('iq-nm-spec').value.trim()]:[]}});
      mfrId=m.id; mfrName=m.name;
    } else { const m=MFRS.find(x=>x.id===mfrId); mfrName=m?m.name:''; }
    const files=(window._iqFiles||[]).filter((f,i)=>{const c=$('iq-f-'+i);return c&&c.checked;});
    const direct=$('iq-direct').checked;
    await api('/outreach',{method:'POST',body:{
      manufacturer_id:mfrId, manufacturer_name:mfrName, product_ids:ids,
      kind:$('iq-kind').value, channel:$('iq-ch').value, status:$('iq-st').value,
      files, follow_up_at:$('iq-fu').value||null,
      note:($('iq-note').value.trim()+(direct?' · 파일 직접 전달(드라이브 링크 미사용)':'')).trim()
    }});
    closeInq(); SEL.clear(); await load(); setView('sourcing'); toast('문의 기록 생성됨');
  }catch(e){ toast('실패: '+e.message); }
}

let OFILTER='all';

      ${chip('all','전체 '+OUTREACH.length)}${chip('sent','회신대기 '+cnt('sent'))}${chip('replied','회신옴 '+cnt('replied'))}${chip('closed','종료 '+cnt('closed'))}
      <span style="margin-left:auto;display:flex;gap:6px">
        <button class="btn sm" onclick="openMfrLib()">🏭 제조사 목록 (${MFRS.length})</button>
        <span class="hint">제품 여러 개 선택 → 문의는 📋테이블 뷰에서</span></span>
    </div></th></tr>
    <tr><th>제조사</th><th>포함 제품</th><th>유형</th><th>채널</th><th>상태</th><th>발송</th><th>팔로업</th></tr></thead><tbody>`;
  html+=rows.map(o=>{
    const prods=(o.product_ids||[]).map(id=>{const p=PROJECTS.find(x=>x.id===id);return p?`<span class="pill">${esc(p.emoji)} ${esc(p.name)}</span>`:'<span class="pill" style="opacity:.5">삭제된 제품</span>';}).join(' ');

async function openOutreach(oid){
  let o; try{ o=await api('/outreach/'+oid); }catch(e){ return toast('로드 실패'); }
  const STEPS=[['draft','초안'],['sent','발송·회신대기'],['replied','회신옴'],['closed','종료']];
  const ci=STEPS.findIndex(s=>s[0]===o.status);
  const prods=(o.product_ids||[]).map(id=>PROJECTS.find(x=>x.id===id)).filter(Boolean);
  const html=`<div class="mbg on" id="ohM" onclick="if(event.target===this)closeOh()">
   <div class="modal" style="max-width:640px"><button class="x" onclick="closeOh()">✕</button>
   <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
     <b style="font-size:16px">🏭 ${esc(o.manufacturer_name||'제조사')}</b>
     <span class="tag t-gray">${esc(o.kind)}</span><span class="tag t-gray">${esc(o.channel||'')}</span></div>
   <div class="steps" style="margin:12px 0">${STEPS.map((s,i)=>`<div class="step ${i<ci?'done':i===ci?'now':''}">${s[1]}</div>`).join('')}</div>
   <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
     <div><h4 style="font-size:12.5px;color:var(--text-2);margin-bottom:5px">포함 제품 ${prods.length}</h4>
       ${prods.map(p=>`<div style="font-size:12.5px;padding:3px 0;cursor:pointer" onclick="closeOh();openDetail('${p.id}','vd')">${esc(p.emoji)} <b>${esc(p.name)}</b></div>`).join('')||'<span class="hint">—</span>'}</div>
     <div><h4 style="font-size:12.5px;color:var(--text-2);margin-bottom:5px">보낸 파일 ${(o.files||[]).length}</h4>

const GT_COLOR={plan:'#93c5fd',design:'#93c5fd',review:'#93c5fd',vendor:'#c4b5fd',pricing:'#c4b5fd',sample:'#fbbf24',po:'#f9a8d4',production:'#f9a8d4',shipping:'#67e8f9',inbound:'#86efac',launch:'#34d399'};
function renderGantt(vis){
  const DAY=86400000,now=Date.now();
  const t0=now-35*DAY,t1=now+60*DAY;
  const x=iso=>Math.max(0,Math.min(100,(new Date(iso).getTime()-t0)/(t1-t0)*100));
  // 월 라벨 (창 안의 매월 1일)
  let months='';
  const d=new Date(t0);d.setDate(1);
  for(let m=new Date(d);m.getTime()<t1;m.setMonth(m.getMonth()+1)){
    if(m.getTime()>=t0)months+=`<span style="left:${x(m.toISOString())}%">${m.getMonth()+1}월</span>`;
  }
  const rows=[...vis].sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
  $('gantt').innerHTML=`<div class="gt-months">${months}</div>`+
  rows.map(p=>{
    const start=p.created_at||new Date(now).toISOString();
    const eta=(p.po&&p.po.eta)||null;
    const endMs=eta?new Date(eta).getTime():Math.min(new Date(start).getTime()+45*DAY,now+14*DAY);
    const s=x(start),e=Math.max(x(new Date(endMs).toISOString()),s+6);
    const due=payDue(p);
    return `<div class="gt-row" onclick="openDetail('${p.id}')">
    <div class="gt-label">${esc(p.emoji)} ${esc(p.name)} <span class="tag ${p.type==='new'?'t-new':'t-re'}" style="font-size:9px">${p.type==='new'?'신':'재'}</span></div>
    <div class="gt-track"><div class="gt-today" style="left:${x(new Date(now).toISOString())}%"></div>
      <div class="gt-bar" style="left:${s}%;width:${e-s}%;background:${GT_COLOR[p.stage]||'#94a3b8'}">${stageLabel(p.stage)}</div>
      ${due?`<span class="gt-marker" title="대금 예정 ${due}" style="left:${x(due)}%">🔻</span>`:''}
      ${eta?`<span class="gt-marker" title="입고 ETA ${eta}" style="left:${x(eta)}%">📦</span>`:''}
    </div></div>`}).join('')||'<div style="padding:20px;color:var(--text-3);font-size:12.5px">진행 중인 프로젝트가 없습니다</div>';
}

async function importQuote(id){

    qty:Number(pr.qty)||null, unit:Number(pr.unitPrice)||null,
    cur:pr.currency||it.currency||'USD', lead_days:null,
    terms:(pr.name||'')+(pr.notes?(' · '+pr.notes):'')

  await refreshCur({vendors:vs});

}

      <td><input type="date" value="${s.requested_at||''}" onchange="sampleField(${i},'requested_at',this.value)"></td>
      <td><input type="date" value="${s.received_at||''}" onchange="sampleField(${i},'received_at',this.value)"></td>
      <td><select onchange="sampleField(${i},'verdict',this.value)">
        <option value="" ${!s.verdict?'selected':''}>대기</option>

        <option value="rejected" ${s.verdict==='rejected'?'selected':''}>❌ 불합격</option></select></td>
      <td><input value="${esc(s.memo||'')}" onchange="sampleField(${i},'memo',this.value)" placeholder="검수 내용"></td>
      <td><button class="del" style="border:none;background:none;color:var(--text-3)" onclick="delSample(${i})">✕</button></td></tr>`).join('')}

}
function addSample(){const ss=[...(CUR.samples||[])];ss.push({rev:ss.length+1,requested_at:new Date().toISOString().slice(0,10),received_at:null,verdict:'',memo:''});refreshCur({samples:ss})}
function sampleField(i,k,v){const ss=[...CUR.samples];ss[i][k]=v;refreshCur({samples:ss})}
function delSample(i){const ss=[...CUR.samples];ss.splice(i,1);refreshCur({samples:ss})}

function savePo(){refreshCur({po:{vendor:$('po-vendor').value.trim()||null,qty:Number($('po-qty').value)||null,unit:Number($('po-unit').value)||null,cur:$('po-cur').value,eta:$('po-eta').value||null,memo:$('po-memo').value.trim()}});toast('PO 저장됨')}
function addPay(){const amt=Number($('pay-amt').value);if(!amt)return toast('금액을 입력하세요');

// -- ③ 입고 대사 (발주 vs 실입고)
function paneInbound(p){
  const poQty=(p.po&&p.po.qty)||(p.target&&p.target.qty)||null;
  const inb=p.inbound;
  let head=`<div style="font-size:12px;color:var(--text-2);margin-bottom:10px">발주 수량 <b style="color:var(--text)">${poQty?poQty.toLocaleString():'미정'}</b> 대비 실입고를 대사합니다. 바코드: <b>${p.barcode?esc(p.barcode):'<span style=\"color:var(--warn)\">미등록 — 등록·출시 단계에서 입력</span>'}</b></div>`;
  let btns=`<div class="frow" style="margin:6px 0 12px">
    <button class="btn sm" ${!p.barcode||!META.inventory_linked?'disabled title="바코드+inventory 연동 필요"':''} onclick="pullInbound()">🔄 inventory 현재고로 대사</button>
    <span style="font-size:11px;color:var(--text-3)">또는 실입고 수량 직접 입력 →</span>
    <input id="in-recv" type="number" placeholder="실입고" style="width:100px" value="${inb?inb.received:''}">
    <button class="btn sm" onclick="manualInbound()">기록</button></div>
    ${!META.inventory_linked?'<div class="hint">⚠️ inventory 연동(INVENTORY_API_URL/KEY) 미설정 — 수동 입력만 가능합니다.</div>':''}`;
  let body='';
  if(inb){
    const diff=inb.diff;
    const diffTag=diff==null?'':diff===0?`<span class="tag t-ok">정확 일치</span>`:diff>0?`<span class="tag t-warn">+${diff} 초과 입고</span>`:`<span class="tag t-err">${diff} 부족</span>`;
    body=`<div class="vendor-box"><div class="vendor-head">
      <b>대사 결과</b> ${diffTag}
      <span style="margin-left:auto;font-size:11px;color:var(--text-3)">${inb.at.slice(0,16).replace('T',' ')} · ${inb.source==='webhook'?'입고 웹훅':inb.source==='pull'?'inventory 조회':'수동'}</span></div>
      <table><tr><th>발주(PO)</th><th>실입고</th><th>오차</th></tr>
      <tr><td>${inb.po_qty!=null?inb.po_qty.toLocaleString():'—'}</td><td><b>${inb.received.toLocaleString()}</b></td>
      <td class="${diff>0?'':diff<0?'':''}" style="color:${diff===0?'var(--ok)':diff>0?'var(--warn)':'var(--err)'};font-weight:700">${diff==null?'—':(diff>0?'+':'')+diff}</td></tr></table>
      ${inb.warehouses&&inb.warehouses.length?`<div style="margin-top:8px;font-size:12px;color:var(--text-2)">창고별: ${inb.warehouses.map(w=>`${esc(w.code)} ${w.qty.toLocaleString()}`).join(' · ')}</div>`:''}
      ${inb.note?`<div style="font-size:11px;color:var(--text-3);margin-top:6px">${esc(inb.note)}</div>`:''}
      ${inb.movements&&inb.movements.length?`<div style="font-size:10.5px;color:var(--text-3);margin-top:4px">movement: ${inb.movements.map(esc).join(', ')}</div>`:''}
    </div>`;
  } else {
    body='<div style="color:var(--text-3);font-size:12.5px;padding:8px 0">아직 대사 기록이 없습니다. 입고가 완료되면 위 버튼으로 발주 대비 실입고를 확인하세요.</div>';
  }
  return head+btns+body+`<div class="hint" style="margin-top:10px">※ inventory 현재고는 "지금 창고에 있는 수량"이라, 신제품 첫 입고는 실입고와 거의 같지만 재발주는 (기존 잔량+신규)일 수 있어요. 필요하면 실입고 수량을 직접 입력해 바로잡으세요. 입고 완료 시 단계가 자동으로 '입고·검수'로 넘어갑니다.</div>`;
}
async function pullInbound(){
  try{ CUR=await api('/'+CUR.id+'/reconcile-inbound',{method:'POST',body:{}}); renderDetail(); load(); toast('inventory 현재고로 대사했습니다'); }
  catch(e){ toast('대사 실패: '+e.message); }
}
async function manualInbound(){
  const raw=$('in-recv').value; if(raw===''||raw==null)return toast('실입고 수량을 입력하세요');

  catch(e){ toast('기록 실패: '+e.message); }
}

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">

    <input id="att-url" placeholder="구글드라이브 링크 https://…" style="flex:1">

      <button class="btn sm" style="margin-left:auto" onclick="openRefsLib(${JSON.stringify(p.id)})">라이브러리 관리</button></div>

      <button class="btn sm" style="margin-left:auto;padding:2px 8px" onclick="detachRef('${r.id}')">연결 해제</button></div>`).join(''):'<div class="hint" style="margin-top:6px">연결된 레퍼런스 없음</div>'}
    <div style="margin-top:8px"><button class="btn sm" onclick="pickRefForProject()">＋ 레퍼런스 연결</button></div>

function addDriveLink(){
  const url=$('att-url').value.trim(); if(!url)return toast('드라이브 링크를 입력하세요');
  if(!/^https?:\/\//i.test(url))return toast('https:// 로 시작하는 링크여야 합니다');
  api('/'+CUR.id+'/attachment-link',{method:'POST',body:{url,name:$('att-url-name').value.trim()||url,stage:CUR.stage}})
    .then(r=>{CUR=r;renderDetail();load();toast('드라이브 링크 첨부됨');})
    .catch(e=>toast('실패: '+e.message));
}

// ── 📚 전역 제조 레퍼런스 라이브러리 ──
// projectId 가 있으면 "이 프로젝트에 연결" 버튼도 노출 (3D 제품 등 제조사 전달용 재사용 자료)
async function openRefsLib(projectId){
  try{ REFS=(await api('/refs')).refs||[]; }catch(e){}
  const linked=projectId&&CUR?(CUR.ref_links||[]):[];
  const rows=REFS.length?REFS.map(r=>`<div style="display:flex;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px">
    <span class="tag ${r.category==='3D'?'t-new':'t-gray'}">${esc(r.category)}</span>
    <a href="${esc(r.url)}" target="_blank" rel="noopener" style="color:var(--accent-strong);text-decoration:none"><b>${esc(r.name)}</b></a>
    ${r.for_manufacturer?'<span class="tag t-ok">제조사 전달용</span>':''}
    ${r.note?`<span style="font-size:11px;color:var(--text-3)">${esc(r.note)}</span>`:''}
    <span style="margin-left:auto;display:flex;gap:5px">
      ${projectId?(linked.includes(r.id)?'<span class="tag t-ok">연결됨</span>':`<button class="btn sm" onclick="attachRefToProject('${r.id}')">이 제품에 연결</button>`):''}
      <button class="btn sm danger" onclick="delRef('${r.id}')">삭제</button></span>
  </div>`).join(''):'<div style="padding:12px;color:var(--text-3);font-size:12.5px">등록된 레퍼런스가 없습니다.</div>';
  const html=`<div class="mbg on" id="refslib" onclick="if(event.target===this)document.getElementById('refslib').remove()">
    <div class="modal" style="max-width:620px"><button class="x" onclick="document.getElementById('refslib').remove()">✕</button>
    <h3 style="font-size:15px">📚 제조 레퍼런스 라이브러리</h3>
    <div style="font-size:11.5px;color:var(--text-3);margin:4px 0 10px">여러 제품에서 재사용하는 공용 자료입니다. 예: 3D 베이스메시(ZBrush/STL) — 3D 제품 발주 시 제조사에 함께 전달. 대용량이라 파일은 <b>구글드라이브에 두고 링크만</b> 등록합니다.</div>
    ${rows}
    <div style="border-top:1px solid var(--line);margin-top:12px;padding-top:12px">
      <div class="frow"><input id="rf-name" placeholder="이름 (예: 3D 베이스메시 세트)" style="flex:1"><select id="rf-cat" style="width:90px"><option>3D</option><option>사양서</option><option>가이드</option><option>기타</option></select></div>
      <div class="frow"><input id="rf-url" placeholder="구글드라이브 링크 https://…" style="flex:1"></div>
      <div class="frow"><input id="rf-note" placeholder="메모 (선택)" style="flex:1">
        <label style="font-size:12px;color:var(--text-2);display:flex;gap:4px;align-items:center"><input type="checkbox" id="rf-mfr" checked> 제조사 전달용</label>
        <button class="btn sm" onclick="createRef(${JSON.stringify(projectId)})">＋ 추가</button></div>
    </div></div></div>`;
  const old=document.getElementById('refslib'); if(old)old.remove();
  document.body.insertAdjacentHTML('beforeend',html);
}
async function createRef(projectId){
  const name=$('rf-name').value.trim(), url=$('rf-url').value.trim();
  if(!name&&!url)return toast('이름 또는 링크를 입력하세요');
  if(url&&!/^https?:\/\//i.test(url))return toast('링크는 https:// 로 시작해야 합니다');
  try{ await api('/refs',{method:'POST',body:{name,url,category:$('rf-cat').value,note:$('rf-note').value.trim(),for_manufacturer:$('rf-mfr').checked}});
    toast('레퍼런스 추가됨'); openRefsLib(projectId); }
  catch(e){ toast('실패: '+e.message); }
}
async function delRef(refId){
  if(!confirm('이 레퍼런스를 삭제할까요? (연결된 프로젝트에서도 사라집니다)'))return;
  try{ await api('/refs/'+refId,{method:'DELETE'}); REFS=(await api('/refs')).refs||[]; openRefsLib(CUR?CUR.id:null); if(CUR)renderDetail(); }
  catch(e){ toast('실패: '+e.message); }
}
async function attachRefToProject(refId){
  if(!CUR)return; const links=[...(CUR.ref_links||[])]; if(!links.includes(refId))links.push(refId);
  await refreshCur({ref_links:links}); const el=document.getElementById('refslib'); if(el)el.remove(); setTab('at'); toast('레퍼런스 연결됨');
}
async function detachRef(refId){
  const links=(CUR.ref_links||[]).filter(x=>x!==refId); await refreshCur({ref_links:links}); toast('연결 해제됨');
}
function pickRefForProject(){ openRefsLib(CUR?CUR.id:null); }
function uploadAttach(){
  const f=$('att-file').files[0]; if(!f)return toast('파일을 선택하세요');
  if(f.size>20*1024*1024)return toast('20MB 이하만 가능합니다');
  const rd=new FileReader();
  rd.onload=async()=>{
    try{ CUR=await api('/'+CUR.id+'/attachment',{method:'POST',body:{dataUrl:rd.result,filename:f.name,stage:CUR.stage}});
      renderDetail(); load(); toast('첨부 업로드됨'); }
    catch(e){ toast('업로드 실패: '+e.message); }
  };
  rd.readAsDataURL(f);
}
async function delAttach(attId){
  if(!confirm('첨부를 삭제할까요?'))return;
  try{ CUR=await api('/'+CUR.id+'/attachment/'+attId,{method:'DELETE'}); renderDetail(); load(); toast('삭제됨'); }
  catch(e){ toast('삭제 실패: '+e.message); }
}

// -- 타임라인·메모
function paneTimeline(p){
  return `<div class="frow"><input id="tl-new" style="flex:1" placeholder="기록 추가 (예: 샘플 발송 통보 받음)" onkeydown="if(event.key==='Enter')addTlLog()"><button class="btn sm" onclick="addTlLog()">＋ 기록</button></div>
  <div class="tl">${[...(p.history||[])].reverse().map(h=>
    `<div class="tle">${esc(h.detail)}<small>${h.at.slice(0,16).replace('T',' ')} · ${esc(h.by)}${h.ev!=='note'?' · '+h.ev:''}</small></div>`).join('')}</div>
  <h3 style="font-size:13px;margin:14px 0 6px">메모</h3>
  <textarea id="tl-notes" style="width:100%;min-height:80px">${esc(p.notes||'')}</textarea>
  <div style="text-align:right;margin-top:6px"><button class="btn sm" onclick="saveNotes()">메모 저장</button></div>`;
}
async function addTlLog(){const v=$('tl-new').value.trim();if(!v)return;
  await api('/'+CUR.id+'/log',{method:'POST',body:{detail:v}});openDetail(CUR.id,'tl')}
function saveNotes(){refreshCur({notes:$('tl-notes').value});toast('메모 저장됨')}

// -- 단계·상태 조작
// 클릭 = 그 단계 체크리스트로 이동(보기). 완료 불은 데이터 기반 자동이라 확인창 불필요.
async function moveStage(s){
  if(s===CUR.stage){setTab('cl');return;}
  try{CUR=await api('/'+CUR.id+'/stage',{method:'POST',body:{stage:s}});CURTAB='cl';renderDetail();load();}
  catch(e){toast('실패: '+e.message)}
}
function setStatus(st){
  if(st==='done'&&!confirm('프로젝트를 완료 처리할까요?'))return;
  refreshCur({status:st})
}
function toggleBrand(){
  const next=brandOf(CUR)==='oem'?'own':'oem';
  if(next==='oem'){
    const c=prompt('외주(고객사 발주)로 전환합니다. 발주처(고객사)를 입력하세요:',CUR.client||'');
    if(c===null)return;
    refreshCur({brand:'oem',client:c.trim()});
  } else refreshCur({brand:'own',client:''});
}
function insertSampleStage(){
  const stages=[...CUR.stages];
  const i=stages.indexOf('po');
  stages.splice(i<0?stages.length:i,0,'sample');
  refreshCur({stages});toast('샘플 단계가 삽입됐습니다')
}
async function delProject(){
  if(!confirm(`"${CUR.name}" 프로젝트를 완전히 삭제할까요? (되돌릴 수 없음 — 보관하려면 보류/완료 사용)`))return;
  await api('/'+CUR.id,{method:'DELETE'});
  closeM('detailModal');load();toast('삭제됨');
}

load().catch(e=>{document.body.innerHTML='<div style="padding:40px;color:#f87171">로드 실패: '+esc(e.message)+' — 로그인 상태를 확인하세요 (<a href="/login.html" style="color:#60a5fa">로그인</a>)</div>'});
</script>
