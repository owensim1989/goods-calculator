<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>로그인 — 제품원가 계산기</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --border: rgba(255,255,255,0.08);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #6366f1;
    --accent-hi: #818cf8;
    --error: #f87171;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(1200px 800px at 90% -10%, rgba(99,102,241,.18), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(34,211,238,.12), transparent 60%),
      var(--bg);
  }
  .card {
    width: 100%; max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
  }
  .brand {
    font-size: 22px; font-weight: 700; margin: 0 0 4px;
    letter-spacing: -.01em;
  }
  .subtitle {
    margin: 0 0 22px; color: var(--muted); font-size: 13px;
  }
  .picker-label {
    font-size: 12px; color: var(--muted); margin: 0 0 8px; font-weight: 500;
  }
  .picker {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    margin-bottom: 16px;
  }
  .picker button {
    padding: 10px 4px; font-size: 13px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    cursor: pointer; transition: .15s;
    font-family: inherit;
  }
  .picker button:hover { background: rgba(99,102,241,.12); }
  .picker button.active {
    background: rgba(99,102,241,.2);
    border-color: var(--accent);
    color: var(--accent-hi);
  }
  label {
    display: block; font-size: 12px; color: var(--muted);
    margin: 14px 0 6px; font-weight: 500;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 11px 13px;
    font-size: 14px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    outline: none;
    transition: .15s;
  }
  input[type=text]:focus, input[type=password]:focus {
    border-color: var(--accent);
    background: rgba(99,102,241,.08);
  }
  .btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px 16px;
    font-size: 14px; font-weight: 600;
    background: var(--accent);
    color: white; border: 0; border-radius: 9px;
    cursor: pointer;
    transition: .15s;
  }
  .btn:hover:not(:disabled) { background: var(--accent-hi); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .err {
    margin-top: 12px; padding: 9px 11px;
    background: rgba(248,113,113,.12);
    border: 1px solid rgba(248,113,113,.35);
    border-radius: 7px;
    color: var(--error);
    font-size: 12px;
    display: none;
  }
  .err.show { display: block; }
  .hint {
    margin-top: 16px;
    color: var(--muted); font-size: 11px; line-height: 1.55;
    text-align: center; opacity: 0.7;
  }
  @media (max-width: 480px) {
    .picker { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <form class="card" id="loginForm" autocomplete="on">
    <h1 class="brand">제품원가 계산기</h1>
    <p class="subtitle">MyDesk 계정으로 로그인</p>

    <div class="picker-label">이름 선택</div>
    <div class="picker" id="namePicker">
      <button type="button" data-name="심영민">심영민</button>
      <button type="button" data-name="김정은">김정은</button>
      <button type="button" data-name="이진아">이진아</button>
      <button type="button" data-name="조희재">조희재</button>
      <button type="button" data-name="성은실">성은실</button>
      <button type="button" data-name="김주희">김주희</button>
      <button type="button" data-name="강수연">강수연</button>
      <button type="button" data-name="윤혜빈">윤혜빈</button>
      <button type="button" data-name="이나현">이나현</button>
      <button type="button" data-name="박소정">박소정</button>
      <button type="button" data-name="우현지">우현지</button>
      <button type="button" data-name="오샛별">오샛별</button>
    </div>

    <input type="text" id="nameInput" name="name" autocomplete="username" placeholder="목록에 없으면 직접 입력">

    <label for="password">MyDesk 비밀번호</label>
    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="MyDesk와 동일">

    <button type="submit" class="btn" id="submitBtn">로그인</button>
    <div class="err" id="errBox"></div>

    <div class="hint">
      비밀번호는 <a href="https://mydesk.jeisha.kr" style="color:var(--accent-hi);" target="_blank">MyDesk</a>와 동일
    </div>
  </form>
</div>
<script>
(function(){
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const errBox = document.getElementById('errBox');
  const nameInput = document.getElementById('nameInput');
  const pwInput = document.getElementById('password');
  const picker = document.getElementById('namePicker');
  let pickedName = '';

  function showErr(m){ errBox.textContent = m; errBox.classList.add('show'); }
  function clearErr(){ errBox.classList.remove('show'); errBox.textContent = ''; }

  picker.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      picker.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      pickedName = b.dataset.name;
      nameInput.value = '';
      try { localStorage.setItem('goods_login_last_name', pickedName); } catch(e){}
      pwInput.focus();
    });
  });

  // 마지막 선택 복원
  try {
    const last = localStorage.getItem('goods_login_last_name');
    if (last) {
      const b = picker.querySelector('button[data-name="' + last + '"]');
      if (b) { b.classList.add('active'); pickedName = last; }
    }
  } catch(e){}

  // 이미 로그인된 상태면 메인으로
  fetch('/api/me', { credentials: 'same-origin' })
    .then(r => r.ok ? r.json() : null)
    .then(j => { if (j && j.ok) location.replace('/'); })
    .catch(() => {});

  nameInput.addEventListener('input', () => {
    if (nameInput.value.trim()) {
      picker.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      pickedName = '';
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErr();
    const name = (pickedName || nameInput.value || '').trim();
    const password = pwInput.value;
    if (!name) { showErr('이름을 선택하거나 입력하세요'); return; }
    if (!password) { showErr('비밀번호를 입력하세요'); return; }
    btn.disabled = true; btn.textContent = '확인 중...';
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ name, password })
      });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.ok) {
        location.replace('/');
        return;
      }
      showErr(j.error || '로그인 실패 (' + r.status + ')');
    } catch (err) {
      showErr('서버 연결 실패: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = '로그인';
    }
  });

  // 첫 진입 포커스: 마지막 선택 있으면 비번, 없으면 이름 input
  setTimeout(() => { if (pickedName) pwInput.focus(); else nameInput.focus(); }, 60);
})();
</script>
</body>
</html>
